name: 🚚 Waybill Checker - Tự động mỗi 5 phút

on:
  # Tự động chạy mỗi 5 phút
  schedule:
    - cron: '*/5 * * * *'
  
  # Cho phép chạy thủ công từ GitHub
  workflow_dispatch:
  
  # Tự động chạy khi có code mới
  push:
    branches: [ main, master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  waybill-checker:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      
      - name: 📦 Install dependencies
        run: npm install
        
      - name: 🚀 Run waybill check
        env:
          # Google Sheets
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}
          GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
          SHEET_NAME: ${{ secrets.SHEET_NAME }}
          
          # G-Solution
          GS_EMAIL: ${{ secrets.GS_EMAIL }}
          GS_PASSWORD: ${{ secrets.GS_PASSWORD }}
          GS_BASE_URL: 'https://g-solution.vn'
          GS_COUNTRY_CODE: '66'
          
          # Telegram
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          
          # Bỏ qua kiểm tra giờ hành chính để chạy 24/7 trên GitHub Actions
          BYPASS_HOURS: 'true'
          
        run: node src/index.js
      
      - name: 🖨️ Debug Logs
        if: always()
        run: cat logs/batch-1.log || echo "Không tìm thấy file log"

